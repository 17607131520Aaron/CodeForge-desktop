name: Build Desktop Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. v1.0.2). Leave empty to use package.json version."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-14
    env:
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip Pillow

      - name: Sync app metadata
        run: pnpm app:meta

      - name: Build package
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            pnpm make:mac:arm64
          else
            pnpm make:mac:x64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            out/make/**/*.zip
            out/make/**/*.dmg
            out/make/**/*.pkg
            out/make/**/RELEASES.json
          if-no-files-found: error

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip

      - name: Sync app metadata
        run: pnpm app:meta

      - name: Build package
        run: pnpm make:win:x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            out/make/**/*.exe
            out/make/**/*.msi
            out/make/**/*.nupkg
            out/make/**/RELEASES
          if-no-files-found: error

  publish-release-assets:
    name: Publish artifacts to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-macos, build-windows-x64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Attach files to release
        env:
          # Prefer dedicated PAT (RELEASE_TOKEN), fallback to default GITHUB_TOKEN.
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          gh --version
          set -euo pipefail

          if [ -z "${RELEASE_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "Missing token. Please provide RELEASE_TOKEN or use default GITHUB_TOKEN."
            exit 1
          fi

          pick_token() {
            local candidate="$1"
            if [ -z "$candidate" ]; then
              return 1
            fi
            GH_TOKEN="$candidate" gh api --silent user >/dev/null 2>&1
          }

          # Prefer RELEASE_TOKEN only when valid, otherwise fallback.
          if pick_token "${RELEASE_TOKEN:-}"; then
            GH_TOKEN="${RELEASE_TOKEN}"
            echo "Using RELEASE_TOKEN."
          elif pick_token "${GITHUB_TOKEN:-}"; then
            GH_TOKEN="${GITHUB_TOKEN}"
            echo "RELEASE_TOKEN invalid/unavailable; fallback to GITHUB_TOKEN."
          else
            echo "No valid GitHub token available."
            exit 1
          fi
          export GH_TOKEN

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            TAG_NAME="$GITHUB_REF_NAME"
          elif [ -n "${INPUT_RELEASE_TAG:-}" ]; then
            TAG_NAME="$INPUT_RELEASE_TAG"
            # Allow both "1.0.3" and "v1.0.3" from workflow_dispatch input.
            if [[ ! "$TAG_NAME" =~ ^v ]]; then
              TAG_NAME="v$TAG_NAME"
            fi
          else
            VERSION="$(node -p "require('./app.json').appVersion")"
            TAG_NAME="v$VERSION"
          fi

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Invalid tag format: $TAG_NAME"
            echo "Expected format like: v1.0.2"
            exit 1
          fi

          echo "Using release tag: $TAG_NAME"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Commit: $GITHUB_SHA"
          TOKEN_LOGIN="$(gh api user --jq .login 2>/dev/null || echo unknown)"
          echo "Token actor: $TOKEN_LOGIN"

          # Ensure tag ref exists; create it automatically when missing.
          if ! gh api --silent --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME does not exist, creating it at $GITHUB_SHA ..."
            if ! gh api --silent --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$TAG_NAME" \
              -f sha="$GITHUB_SHA" >/dev/null; then
              # Handle race condition: tag may have been created concurrently.
              if gh api --silent --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG_NAME" >/dev/null 2>&1; then
                echo "Tag $TAG_NAME already exists now; continuing."
              else
                echo "Failed to create tag ref: $TAG_NAME"
                echo "Likely blocked by tag protection/ruleset (HTTP 422)."
                echo "Please create and push tag manually, then rerun:"
                echo "  git tag $TAG_NAME && git push origin $TAG_NAME"
                echo "Current token actor: $TOKEN_LOGIN"
                exit 1
              fi
            fi
          fi

          # Prefer querying by tag via API (works even when release is immutable).
          if ! gh api --silent --method GET "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes "Automated build artifacts."
          fi

          # Final sanity check: release must exist before upload.
          gh api --silent --method GET "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" >/dev/null

          mapfile -t files < <(find release-assets -type f \( \
            -name "*.zip" -o -name "*.dmg" -o -name "*.pkg" -o -name "RELEASES.json" -o \
            -name "*.exe" -o -name "*.msi" -o -name "*.nupkg" -o \
            -name "RELEASES" \
          \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
