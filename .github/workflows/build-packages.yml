name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build package
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            pnpm make:mac:arm64
          else
            pnpm make:mac:x64
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            out/make/**/*.zip
            out/make/**/*.dmg
            out/make/**/*.pkg
            out/make/**/RELEASES.json
          if-no-files-found: error

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build package
        run: pnpm make:win:x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            out/make/**/*.exe
            out/make/**/*.msi
            out/make/**/*.nupkg
            out/make/**/RELEASES
          if-no-files-found: error

  publish-release-assets:
    name: Publish artifacts to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build-macos, build-windows-x64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Attach files to release
        env:
          # Prefer a dedicated PAT for release operations.
          # Fallback to the default Actions token.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh --version
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            TAG_NAME="$GITHUB_REF_NAME"
          else
            VERSION="$(node -p "require('./app.json').appVersion")"
            TAG_NAME="v$VERSION"
          fi

          echo "Using release tag: $TAG_NAME"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Commit: $GITHUB_SHA"

          # Ensure tag ref exists; create it automatically when missing.
          if ! gh api --silent --method GET "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME does not exist, creating it at $GITHUB_SHA ..."
            if ! gh api --silent --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$TAG_NAME" \
              -f sha="$GITHUB_SHA" >/dev/null; then
              echo "Failed to create tag ref: $TAG_NAME"
              echo "Repository rules are likely blocking this token from creating refs."
              echo "Recommended: add repository secret RELEASE_TOKEN (PAT) with contents:write"
              echo "and allow that actor to bypass ref-creation restrictions in rulesets."
              exit 1
            fi
          fi

          # Prefer querying by tag via API (works even when release is immutable).
          if ! gh api --silent --method GET "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --notes "Automated build artifacts."
          fi

          # Final sanity check: release must exist before upload.
          gh api --silent --method GET "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" >/dev/null

          mapfile -t files < <(find release-assets -type f \( \
            -name "*.zip" -o -name "*.dmg" -o -name "*.pkg" -o -name "RELEASES.json" -o \
            -name "*.exe" -o -name "*.msi" -o -name "*.nupkg" -o \
            -name "RELEASES" \
          \))
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
